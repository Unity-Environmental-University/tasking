<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>tasking</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=IBM+Plex+Sans:wght@400;500;600&display=swap');

  :root {
    --cream: #F7F4EF;
    --paper: #FDFAF6;
    --ink: #1A1612;
    --ink-mid: #5C4F43;
    --ink-light: #9C8E82;
    --ink-faint: #C4B8AB;
    --coral: #C94F2A;
    --brass: #A87228;
    --teal: #1A7060;
    --grid: #E8E0D4;
    --warm-white: #FFF9F2;
    --shadow: rgba(26, 22, 18, 0.06);
    --shadow-md: rgba(26, 22, 18, 0.1);
    --radius: 4px;
    --mono: 'IBM Plex Mono', 'SF Mono', monospace;
    --sans: 'IBM Plex Sans', -apple-system, system-ui, sans-serif;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: var(--sans);
    font-size: 14px;
    background: var(--cream);
    color: var(--ink);
    line-height: 1.6;
  }

  /* ── top bar ────────────────────────────────── */
  .topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 14px 24px;
    background: var(--paper);
    border-bottom: 1px solid var(--grid);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .topbar-left { display: flex; align-items: center; gap: 16px; }
  .topbar h1 {
    font-family: var(--mono);
    font-size: 14px;
    font-weight: 600;
    color: var(--ink);
    letter-spacing: 0.5px;
  }
  .topbar h1 span { color: var(--coral); }

  .stats {
    display: flex;
    gap: 14px;
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-light);
  }
  .stat .n { font-weight: 600; color: var(--ink-mid); }
  .stat.flagged .n { color: var(--coral); }

  .oncall-badge {
    font-family: var(--mono);
    padding: 4px 12px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 500;
  }
  .oncall-badge.active { background: var(--brass); color: var(--warm-white); }
  .oncall-badge.inactive { background: var(--grid); color: var(--ink-light); }

  /* ── tabs ────────────────────────────────────── */
  .tabs {
    display: flex;
    gap: 0;
    padding: 0 24px;
    background: var(--paper);
    border-bottom: 1px solid var(--grid);
  }
  .tab {
    padding: 10px 18px;
    cursor: pointer;
    color: var(--ink-light);
    border-bottom: 2px solid transparent;
    font-family: var(--mono);
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.3px;
    transition: all 0.15s;
    user-select: none;
  }
  .tab:hover { color: var(--ink-mid); }
  .tab.active { color: var(--coral); border-bottom-color: var(--coral); }
  .tab .badge {
    display: inline-block;
    background: var(--coral);
    color: var(--warm-white);
    font-size: 10px;
    font-weight: 600;
    padding: 1px 6px;
    border-radius: 8px;
    margin-left: 6px;
  }

  /* ── main ────────────────────────────────────── */
  .main {
    padding: 20px 24px 100px;
    max-width: 820px;
    margin: 0 auto;
  }

  /* ── empty state ─────────────────────────────── */
  .empty {
    color: var(--ink-light);
    padding: 48px 24px;
    text-align: center;
    font-size: 13px;
    font-style: italic;
  }
  .loading { color: var(--ink-faint); padding: 32px; text-align: center; font-size: 13px; }

  /* ── repo groups ─────────────────────────────── */
  .repo-group { margin-bottom: 24px; }
  .repo-header {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-light);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding: 8px 0 6px;
    border-bottom: 1px solid var(--grid);
    margin-bottom: 8px;
  }

  /* ── task cards ──────────────────────────────── */
  .task {
    background: var(--paper);
    border: 1px solid var(--grid);
    border-radius: var(--radius);
    padding: 10px 14px;
    margin-bottom: 5px;
    cursor: pointer;
    transition: all 0.12s;
  }
  .task:hover {
    border-color: var(--ink-faint);
    box-shadow: 0 1px 3px var(--shadow);
  }
  .task.flagged {
    border-left: 3px solid var(--coral);
    background: #FEF8F5;
  }
  .task.done { opacity: 0.45; }
  .task.cancelled { opacity: 0.3; text-decoration: line-through; }
  .task.expanded {
    border-color: var(--ink-faint);
    box-shadow: 0 2px 8px var(--shadow-md);
  }

  .task-top { display: flex; align-items: flex-start; gap: 8px; }
  .task-body { flex: 1; min-width: 0; }
  .task-sym {
    font-family: var(--mono);
    font-size: 12px;
    color: var(--ink-light);
    flex-shrink: 0;
    width: 42px;
    text-align: right;
    padding-top: 1px;
  }
  .task-text {
    color: var(--ink);
    font-size: 13px;
    line-height: 1.5;
    max-height: 4.5em; /* ~3 lines when collapsed */
    overflow: hidden;
    position: relative;
  }
  .task.expanded .task-text {
    max-height: none;
  }
  .task-meta {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
    align-items: center;
  }

  .pill {
    font-family: var(--mono);
    font-size: 10px;
    padding: 1px 7px;
    border-radius: 3px;
    font-weight: 500;
  }
  .pill.source { background: #F0EBE4; color: var(--ink-mid); }
  .pill.repo { background: #E8F0ED; color: var(--teal); }
  .pill.flag { background: #FDEEE8; color: var(--coral); font-weight: 600; }
  .pill.claude-tag { background: #EDE8F4; color: #6B4FA0; }
  .pill.replies { background: #F0EBE4; color: var(--ink-mid); cursor: pointer; }
  .pill.status-done { background: #E6F2EA; color: var(--teal); }
  .pill.status-cancelled { background: #F8E8E8; color: var(--coral); }
  .pill.date { color: var(--ink-faint); font-size: 10px; }
  .pill.persona { background: #E8EDF4; color: #3D5A80; font-weight: 500; cursor: pointer; }
  .pill.persona:hover { background: #D4DCE8; }
  .pill.pri-A { background: #FDEEE8; color: var(--coral); font-weight: 700; }
  .pill.pri-B { background: #FFF3E0; color: var(--brass); font-weight: 600; }
  .pill.pri-C { background: #F0EBE4; color: var(--ink-mid); }

  /* priority + flag selectors in actions */
  .priority-btns { display: inline-flex; gap: 2px; margin-right: 4px; }
  .priority-btns .btn { padding: 3px 8px; font-size: 10px; min-width: 24px; text-align: center; }
  .priority-btns .btn.active { background: var(--ink); color: var(--warm-white); border-color: var(--ink); }

  .flag-selector { display: inline-flex; gap: 2px; }
  .flag-selector .btn { padding: 3px 8px; font-size: 10px; }

  /* ── actions ─────────────────────────────────── */
  .task-actions {
    display: none;
    gap: 4px;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid var(--grid);
  }
  .task.expanded .task-actions { display: flex; flex-wrap: wrap; }

  .btn {
    padding: 4px 12px;
    border: 1px solid var(--grid);
    border-radius: 3px;
    background: var(--paper);
    color: var(--ink-mid);
    font-family: var(--mono);
    font-size: 11px;
    cursor: pointer;
    transition: all 0.1s;
  }
  .btn:hover { border-color: var(--ink-faint); color: var(--ink); background: var(--warm-white); }
  .btn.done-btn:hover { border-color: var(--teal); color: var(--teal); }
  .btn.cancel-btn:hover { border-color: var(--coral); color: var(--coral); }

  /* ── thread ──────────────────────────────────── */
  .thread {
    margin-top: 8px;
    padding-left: 14px;
    border-left: 2px solid var(--grid);
    display: none;
  }
  .task.expanded .thread { display: block; }
  .thread-reply {
    padding: 6px 10px;
    margin-bottom: 4px;
    background: var(--cream);
    border-radius: var(--radius);
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.5;
  }
  .thread-reply .reply-id {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    margin-right: 4px;
  }
  .thread-reply .reply-source { color: var(--ink-light); font-size: 10px; }
  .thread-reply .reply-time { color: var(--ink-faint); font-size: 10px; float: right; }

  /* parent breadcrumb for reply tasks */
  .parent-breadcrumb {
    margin-bottom: 4px;
    font-size: 11px;
    font-family: var(--mono);
    color: var(--ink-light);
    cursor: pointer;
    display: flex;
    align-items: baseline;
    gap: 4px;
  }
  .parent-breadcrumb:hover { color: var(--coral); }
  .parent-breadcrumb .parent-arrow { color: var(--ink-faint); }
  .parent-breadcrumb .parent-body {
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 500px;
  }
  .parent-breadcrumb .parent-root {
    color: var(--ink-faint);
    font-size: 10px;
  }

  /* thread preview (visible when collapsed) */
  .thread-preview {
    margin-top: 6px;
    padding: 5px 10px;
    background: var(--cream);
    border-left: 2px solid var(--grid);
    border-radius: 0 var(--radius) var(--radius) 0;
    font-size: 12px;
    color: var(--ink-mid);
    line-height: 1.4;
    max-height: 2.8em;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .thread-preview .preview-source {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    margin-right: 4px;
  }
  .thread-preview .preview-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
  }
  .task.expanded .thread-preview { display: none; }

  /* ── reply input ─────────────────────────────── */
  .reply-form {
    display: none;
    margin-top: 8px;
    gap: 6px;
  }
  .reply-form.visible { display: flex; }
  .reply-form input {
    flex: 1;
    padding: 6px 10px;
    background: var(--cream);
    border: 1px solid var(--grid);
    border-radius: 3px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 12px;
  }
  .reply-form input:focus { outline: none; border-color: var(--ink-faint); }

  /* ── snooze picker ───────────────────────────── */
  .snooze-picker { display: none; margin-top: 6px; gap: 4px; }
  .snooze-picker.visible { display: flex; flex-wrap: wrap; }

  /* ── add bar ─────────────────────────────────── */
  .add-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    padding: 12px 24px;
    background: var(--paper);
    border-top: 1px solid var(--grid);
    display: flex;
    gap: 8px;
    z-index: 100;
    box-shadow: 0 -2px 8px var(--shadow);
  }
  .add-bar input {
    flex: 1;
    padding: 8px 12px;
    background: var(--cream);
    border: 1px solid var(--grid);
    border-radius: 3px;
    color: var(--ink);
    font-family: var(--sans);
    font-size: 13px;
  }
  .add-bar input:focus { outline: none; border-color: var(--ink-faint); }
  .add-bar select {
    padding: 6px 8px;
    background: var(--cream);
    border: 1px solid var(--grid);
    border-radius: 3px;
    color: var(--ink-mid);
    font-family: var(--mono);
    font-size: 11px;
  }
  .add-bar .btn { background: var(--teal); color: var(--warm-white); border-color: var(--teal); }
  .add-bar .btn:hover { background: #15594C; }

  /* ── thread overlay ────────────────────────────── */
  .thread-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(26, 22, 18, 0.4);
    z-index: 200;
    justify-content: center;
    align-items: flex-start;
    padding-top: 80px;
  }
  .thread-overlay.visible { display: flex; }
  .thread-overlay-content {
    background: var(--paper);
    border: 1px solid var(--grid);
    border-radius: 8px;
    box-shadow: 0 8px 32px var(--shadow-md);
    width: min(720px, 90vw);
    max-height: 70vh;
    overflow-y: auto;
    padding: 20px;
  }
  .thread-overlay-content .thread-root {
    font-size: 15px;
    font-weight: 500;
    margin-bottom: 16px;
    padding-bottom: 12px;
    border-bottom: 1px solid var(--grid);
  }
  .thread-overlay-content .thread-root-id {
    font-family: var(--mono);
    color: var(--ink-light);
    font-size: 12px;
  }
  .thread-overlay-content .thread-root-meta {
    font-size: 11px;
    color: var(--ink-light);
    margin-top: 4px;
  }
  .thread-overlay-content .thread-entry {
    padding: 8px 0 8px 16px;
    border-left: 2px solid var(--grid);
    margin-left: 8px;
    margin-bottom: 4px;
  }
  .thread-overlay-content .thread-entry-id {
    font-family: var(--mono);
    font-size: 11px;
    color: var(--ink-light);
    margin-right: 6px;
  }
  .thread-overlay-content .thread-entry-source {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-light);
    margin-left: 6px;
  }
  .thread-overlay-content .thread-entry-time {
    font-family: var(--mono);
    font-size: 10px;
    color: var(--ink-faint);
    float: right;
  }
  .thread-overlay-content .thread-entry.current {
    background: var(--cream);
    border-left-color: var(--coral);
    border-radius: 0 var(--radius) var(--radius) 0;
  }
  .thread-overlay-close {
    float: right;
    cursor: pointer;
    font-size: 18px;
    color: var(--ink-light);
    line-height: 1;
  }
  .thread-overlay-close:hover { color: var(--coral); }

  /* ── signal view ─────────────────────────────── */
  .signal-section { margin-bottom: 20px; }
  .signal-section h3 {
    font-family: var(--mono);
    font-size: 10px;
    font-weight: 600;
    color: var(--ink-light);
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 8px;
    padding-bottom: 4px;
    border-bottom: 1px solid var(--grid);
  }
  .signal-item {
    padding: 4px 0;
    font-size: 12px;
    color: var(--ink-mid);
    font-family: var(--mono);
  }
  .signal-item .age { color: var(--coral); font-weight: 600; }

  /* ── activity feed ───────────────────────────── */
  .activity-item {
    padding: 8px 0;
    font-size: 12px;
    border-bottom: 1px solid var(--grid);
    display: flex;
    gap: 10px;
    align-items: baseline;
    font-family: var(--mono);
  }
  .activity-item .pred {
    color: var(--teal);
    min-width: 140px;
    font-size: 11px;
  }
  .activity-item .subj { color: var(--ink-mid); }
  .activity-item .time {
    color: var(--ink-faint);
    margin-left: auto;
    white-space: nowrap;
    font-size: 10px;
  }
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <h1>t<span>.</span></h1>
    <div class="stats">
      <div class="stat"><span class="n" id="stat-open">-</span> open</div>
      <div class="stat flagged"><span class="n" id="stat-flagged">-</span> flagged</div>
      <div class="stat"><span class="n" id="stat-done">-</span> done today</div>
      <div class="stat"><span class="n" id="stat-claude">-</span> [c]</div>
    </div>
  </div>
  <div id="oncall-badge" class="oncall-badge inactive">no oncall</div>
</div>

<div class="tabs">
  <div class="tab active" data-tab="attention">attention <span class="badge" id="attn-count" style="display:none">0</span></div>
  <div class="tab" data-tab="open">all open</div>
  <div class="tab" data-tab="repos">by repo</div>
  <div class="tab" data-tab="stories">stories</div>
  <div class="tab" data-tab="activity">activity</div>
  <div class="tab" data-tab="signal">signal</div>
  <div class="tab" data-tab="history">history</div>
</div>

<div class="main" id="content">
  <div class="loading">loading...</div>
</div>

<div class="thread-overlay" id="thread-overlay" onclick="if(event.target===this)closeThreadOverlay()">
  <div class="thread-overlay-content" id="thread-overlay-content"></div>
</div>

<div class="add-bar">
  <input type="text" id="add-input" placeholder="add a task... (@repo to scope locally)">
  <select id="add-tags">
    <option value="">no tag</option>
    <option value="c">[c]</option>
  </select>
  <select id="add-priority">
    <option value="">pri</option>
    <option value="A">A</option>
    <option value="B">B</option>
    <option value="C">C</option>
  </select>
  <select id="add-needs">
    <option value="">needs</option>
    <option value="@hallie">@h</option>
    <option value="@claude">@c</option>
  </select>
  <button class="btn" onclick="addTask()">add</button>
</div>

<script>
const API = `http://${location.hostname}:${location.port}/api`;
let currentTab = 'attention';
let expandedId = null;

// track whether user is typing — don't refresh if so
let userIsTyping = false;
let typingTimeout = null;
document.addEventListener('focusin', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    userIsTyping = true;
    clearTimeout(typingTimeout);
  }
});
document.addEventListener('focusout', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
    typingTimeout = setTimeout(() => { userIsTyping = false; }, 1000);
  }
});

async function api(path, opts = {}) {
  const res = await fetch(`${API}${path}`, {
    headers: { 'Content-Type': 'application/json' },
    ...opts,
  });
  return res.json();
}

function timeAgo(dateStr) {
  const d = new Date(dateStr);
  const mins = Math.round((Date.now() - d) / 60000);
  if (mins < 1) return 'now';
  if (mins < 60) return `${mins}m`;
  const hrs = Math.round(mins / 60);
  if (hrs < 24) return `${hrs}h`;
  const days = Math.round(hrs / 24);
  return `${days}d`;
}

function dateStr(d) {
  if (!d) return '';
  return new Date(d).toISOString().slice(0, 10);
}

function esc(str) {
  const d = document.createElement('div');
  d.textContent = str;
  return d.innerHTML;
}

function renderPills(task) {
  let h = '';
  if (task.priority) h += `<span class="pill pri-${task.priority}">${task.priority}</span>`;
  if (task.source && task.source !== 'hallie') h += `<span class="pill source">{${task.source}}</span>`;
  if (task.repo) h += `<span class="pill repo">@${task.repo}</span>`;
  if (task.needs_attention) h += `<span class="pill flag">${task.needs_attention}</span>`;
  if (task.tags?.includes('c')) h += `<span class="pill claude-tag">[c]</span>`;
  if (task.personas?.length) task.personas.forEach(p => { h += `<span class="pill persona" onclick="event.stopPropagation(); removeStory(${task.id},'${p}')" title="click to remove">♟${p}</span>`; });
  if (task.reply_count > 0) h += `<span class="pill replies">${task.reply_count} repl${task.reply_count === 1 ? 'y' : 'ies'}</span>`;
  if (task.status === 'done') h += `<span class="pill status-done">done</span>`;
  if (task.status === 'cancelled') h += `<span class="pill status-cancelled">cancelled</span>`;
  h += `<span class="pill date">${dateStr(task.task_date)}</span>`;
  return h;
}

function renderTask(task) {
  const expanded = expandedId === task.id;
  const cls = [
    'task',
    task.needs_attention ? 'flagged' : '',
    task.status === 'done' ? 'done' : '',
    task.status === 'cancelled' ? 'cancelled' : '',
    expanded ? 'expanded' : '',
  ].filter(Boolean).join(' ');

  const sym = { open: '\u2022', done: '\u2713', cancelled: '\u2717', log: '\u2013', 'needs-review': '~' }[task.status] || '?';

  return `
    <div class="${cls}" data-id="${task.id}" onclick="toggleTask(${task.id})">
      <div class="task-top">
        <div class="task-sym">${task.id} ${sym}</div>
        <div class="task-body">
          ${task.parent ? `<div class="parent-breadcrumb" onclick="event.stopPropagation(); openThread(${task.thread_root ? task.thread_root.id : task.parent.id}, ${task.id})">
            <span class="parent-arrow">↩</span>
            <span class="parent-body">[${task.parent.id}] ${esc(task.parent.body.slice(0, 80))}${task.parent.body.length > 80 ? '…' : ''}</span>
            ${task.thread_root && task.thread_root.id !== task.parent.id ? `<span class="parent-root">(root: [${task.thread_root.id}])</span>` : ''}
          </div>` : ''}
          <div class="task-text">${esc(task.body)}</div>
          <div class="task-meta">${renderPills(task)}</div>
          ${task.last_reply ? `<div class="thread-preview">
            <span class="preview-source">${task.last_reply.source && task.last_reply.source !== 'hallie' ? `{${task.last_reply.source}}` : ''}</span>
            ${esc(task.last_reply.body.slice(0, 150))}${task.last_reply.body.length > 150 ? '…' : ''}
            <span class="preview-time">${timeAgo(task.last_reply.created_at)}</span>
          </div>` : ''}
        </div>
      </div>
      <div class="task-actions">
        ${task.status === 'open' ? `
          <div class="priority-btns">
            <button class="btn ${task.priority==='A'?'active':''}" onclick="setPriority(event,${task.id},'A')">A</button>
            <button class="btn ${task.priority==='B'?'active':''}" onclick="setPriority(event,${task.id},'B')">B</button>
            <button class="btn ${task.priority==='C'?'active':''}" onclick="setPriority(event,${task.id},'C')">C</button>
            ${task.priority ? `<button class="btn" onclick="setPriority(event,${task.id},null)">\u00d7</button>` : ''}
          </div>
          <button class="btn done-btn" onclick="doAction(event,${task.id},'done')">done</button>
          <button class="btn" onclick="showSnooze(event,${task.id})">snooze</button>
          <button class="btn" onclick="showReply(event,${task.id})">reply</button>
          <div class="flag-selector">
            <button class="btn" onclick="setFlag(event,${task.id},'@hallie')">⚑ @h</button>
            <button class="btn" onclick="setFlag(event,${task.id},'@claude')">⚑ @c</button>
            ${task.needs_attention ? `<button class="btn" onclick="doAction(event,${task.id},'unflag')">unflag</button>` : ''}
          </div>
          <button class="btn" onclick="showEdit(event,${task.id})">edit</button>
          <button class="btn" onclick="showStory(event,${task.id})">♟ story</button>
          <button class="btn cancel-btn" onclick="doAction(event,${task.id},'cancel')">cancel</button>
        ` : ''}
      </div>
      <div class="reply-form" id="edit-${task.id}">
        <input type="text" placeholder="edit body..." value="${esc(task.body)}" onkeydown="if(event.key==='Enter')submitEdit(${task.id},this);if(event.key==='Escape'){event.stopPropagation();this.parentElement.classList.remove('visible')}">
        <button class="btn" onclick="submitEdit(${task.id},this.previousElementSibling)">save</button>
      </div>
      <div class="reply-form" id="story-${task.id}">
        <input type="text" placeholder="persona (e.g. learning-student)" onkeydown="if(event.key==='Enter')submitStory(${task.id},this)">
        <button class="btn" onclick="submitStory(${task.id},this.previousElementSibling)">attach</button>
      </div>
      <div class="snooze-picker" id="snooze-${task.id}">
        <button class="btn" onclick="doSnooze(event,${task.id},'tomorrow')">tomorrow</button>
        <button class="btn" onclick="doSnooze(event,${task.id},'friday')">friday</button>
        <button class="btn" onclick="doSnooze(event,${task.id},'next-week')">next week</button>
        <button class="btn" onclick="doSnooze(event,${task.id},'next-month')">next month</button>
        <input type="date" style="padding:3px 6px;border:1px solid var(--grid);border-radius:3px;font-family:var(--mono);font-size:10px;color:var(--ink-mid)" onchange="doSnoozeDate(event,${task.id},this.value)">
      </div>
      <div class="reply-form" id="reply-${task.id}">
        <input type="text" placeholder="reply..." onkeydown="if(event.key==='Enter')submitReply(${task.id},this)">
        <button class="btn" onclick="submitReply(${task.id},this.previousElementSibling)">send</button>
      </div>
      <div class="thread" id="thread-${task.id}"></div>
    </div>
  `;
}

// ── tab views ──────────────────────────────────

async function loadTab(tab, preserveExpanded = false) {
  currentTab = tab;
  if (!preserveExpanded) expandedId = null;
  const el = document.getElementById('content');
  el.innerHTML = '<div class="loading">loading...</div>';
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));

  if (tab === 'attention') {
    const tasks = await api('/tasks/attention?who=hallie');
    if (tasks.length) {
      el.innerHTML = tasks.map(renderTask).join('');
    } else {
      // Show a useful digest instead of dead end
      const [recent, stats] = await Promise.all([
        api('/activity?limit=12'),
        api('/stats'),
      ]);
      let html = '<div class="empty">Nothing needs your attention right now.</div>';
      html += '<div style="max-width:600px;margin:16px auto;padding:0 24px">';
      html += `<div style="font-family:var(--mono);font-size:11px;color:var(--ink-light);margin-bottom:12px">${stats.open} open · ${stats.done_today} done today · ${stats.claude_tasks} [c]</div>`;
      if (recent.length) {
        html += '<div style="font-family:var(--mono);font-size:10px;color:var(--ink-light);text-transform:uppercase;letter-spacing:1.5px;margin-bottom:6px">recent</div>';
        recent.forEach(a => {
          const verb = a.predicate.replace(/-/g, ' ');
          html += `<div style="font-size:12px;color:var(--ink-mid);padding:3px 0;font-family:var(--mono)">${esc(a.subject)} <span style="color:var(--teal)">${esc(verb)}</span> ${esc(a.object)} <span style="color:var(--ink-faint);font-size:10px">${timeAgo(a.created_at)}</span></div>`;
        });
      }
      html += '</div>';
      el.innerHTML = html;
    }
  }
  else if (tab === 'open') {
    const tasks = await api('/tasks');
    el.innerHTML = tasks.length ? tasks.map(renderTask).join('') : '<div class="empty">No open tasks.</div>';
  }
  else if (tab === 'repos') {
    const tasks = await api('/tasks');
    const groups = {};
    tasks.forEach(t => { const k = t.repo || '(global)'; (groups[k] = groups[k] || []).push(t); });
    const sorted = Object.entries(groups).sort((a, b) => {
      const af = a[1].filter(t => t.needs_attention).length;
      const bf = b[1].filter(t => t.needs_attention).length;
      return bf !== af ? bf - af : b[1].length - a[1].length;
    });
    let html = '';
    for (const [repo, tasks] of sorted) {
      const flagged = tasks.filter(t => t.needs_attention).length;
      html += `<div class="repo-group">`;
      html += `<div class="repo-header">${esc(repo)} (${tasks.length}${flagged ? ` \u00b7 ${flagged} flagged` : ''})</div>`;
      html += tasks.map(renderTask).join('');
      html += `</div>`;
    }
    el.innerHTML = html || '<div class="empty">No open tasks.</div>';
  }
  else if (tab === 'stories') {
    const personas = await api('/stories');
    if (!personas.length) {
      el.innerHTML = '<div class="empty">No personas yet. Expand a task and click ♟ story to attach one.</div>';
    } else {
      let html = '';
      for (const p of personas) {
        html += `<div class="repo-group">`;
        html += `<div class="repo-header">♟ ${esc(p.persona)} (${p.tasks.length} task${p.tasks.length === 1 ? '' : 's'})</div>`;
        html += p.tasks.map(renderTask).join('');
        html += `</div>`;
      }
      el.innerHTML = html;
    }
  }
  else if (tab === 'activity') {
    const items = await api('/activity?limit=60');
    el.innerHTML = items.length
      ? items.map(a => `
          <div class="activity-item">
            <span class="subj">${esc(a.subject)}</span>
            <span class="pred">${esc(a.predicate)}</span>
            <span class="subj">${esc(a.object)}</span>
            <span class="time">${timeAgo(a.created_at)}</span>
          </div>`).join('')
      : '<div class="empty">No recent activity.</div>';
  }
  else if (tab === 'signal') {
    const data = await api('/signal');
    let html = '';
    if (data.stuck?.length) {
      html += `<div class="signal-section"><h3>stuck (open &gt; 3 days)</h3>`;
      data.stuck.forEach(t => {
        const repo = t.project ? t.project.split('/').pop() : '(global)';
        const body = t.body.length > 120 ? t.body.slice(0, 120) + '…' : t.body;
        html += `<div class="signal-item"><span class="age">${t.age_days}d</span> [${t.id}] ${esc(body)} <span class="pill repo">@${repo}</span></div>`;
      });
      html += `</div>`;
    }
    if (data.deferred?.length) {
      html += `<div class="signal-section"><h3>deferred</h3>`;
      data.deferred.forEach(t => {
        const repo = t.project ? t.project.split('/').pop() : '(global)';
        const body = t.body.length > 120 ? t.body.slice(0, 120) + '…' : t.body;
        html += `<div class="signal-item">${dateStr(t.snoozed_to)} (+${t.days_away}d) [${t.id}] ${esc(body)} <span class="pill repo">@${repo}</span></div>`;
      });
      html += `</div>`;
    }
    if (data.clusters?.length) {
      html += `<div class="signal-section"><h3>clusters</h3>`;
      data.clusters.forEach(c => {
        html += `<div class="signal-item">${esc(c.repo)} \u2014 ${c.open_count} open (oldest: ${dateStr(c.oldest)})</div>`;
      });
      html += `</div>`;
    }
    if (data.velocity?.length) {
      html += `<div class="signal-section"><h3>velocity (7 days)</h3>`;
      data.velocity.forEach(v => {
        html += `<div class="signal-item">${dateStr(v.day)} \u2014 ${v.done} done</div>`;
      });
      html += `</div>`;
    }
    if (data.signals?.length) {
      html += `<div class="signal-section"><h3>unacted loop signals</h3>`;
      data.signals.forEach(s => {
        const body = s.body.length > 120 ? s.body.slice(0, 120) + '…' : s.body;
        html += `<div class="signal-item">[${s.id}] ${esc(body)}</div>`;
      });
      html += `</div>`;
    }
    el.innerHTML = html || '<div class="empty">No signals.</div>';
  }
  else if (tab === 'history') {
    const tasks = await api('/tasks/all?limit=100');
    el.innerHTML = tasks.length ? tasks.map(renderTask).join('') : '<div class="empty">No history.</div>';
  }
}

// ── interactions ───────────────────────────────

async function toggleTask(id) {
  if (expandedId === id) {
    expandedId = null;
  } else {
    expandedId = id;
    const data = await api(`/tasks/${id}/thread`);
    const el = document.getElementById(`thread-${id}`);
    if (data.thread?.length) {
      el.innerHTML = data.thread.map(t => `
        <div class="thread-reply">
          <span class="reply-id">[${t.id}]</span>
          ${esc(t.body)}
          ${t.source && t.source !== 'hallie' ? `<span class="reply-source">{${t.source}}</span>` : ''}
          <span class="reply-time">${timeAgo(t.created_at)}</span>
        </div>
      `).join('');
    } else {
      el.innerHTML = '<div class="thread-reply" style="color:var(--ink-faint);font-style:italic">(no replies)</div>';
    }
  }
  document.querySelectorAll('.task').forEach(el => {
    el.classList.toggle('expanded', parseInt(el.dataset.id) === expandedId);
  });
}

async function openThread(rootId, highlightId) {
  const data = await api(`/tasks/${rootId}/thread`);
  if (!data.root) return;
  const overlay = document.getElementById('thread-overlay');
  const content = document.getElementById('thread-overlay-content');
  const root = data.root;
  const rootStatus = { open: '\u2022', done: '\u2713', cancelled: '\u2717', log: '\u2013' }[root.status] || '?';
  let html = `<span class="thread-overlay-close" onclick="closeThreadOverlay()">\u00d7</span>`;
  html += `<div class="thread-root">
    <span class="thread-root-id">[${root.id}] ${rootStatus}</span> ${esc(root.body)}
    <div class="thread-root-meta">${root.source && root.source !== 'hallie' ? `{${root.source}} ` : ''}${root.repo ? '@' + root.repo + ' ' : ''}${dateStr(root.task_date)}</div>
  </div>`;
  if (data.thread?.length) {
    for (const t of data.thread) {
      const isCurrent = t.id === highlightId;
      html += `<div class="thread-entry${isCurrent ? ' current' : ''}" style="margin-left:${8 + t.depth * 16}px">
        <span class="thread-entry-id">[${t.id}]</span>
        ${esc(t.body)}
        ${t.source && t.source !== 'hallie' ? `<span class="thread-entry-source">{${t.source}}</span>` : ''}
        <span class="thread-entry-time">${timeAgo(t.created_at)}</span>
      </div>`;
    }
  } else {
    html += `<div style="color:var(--ink-faint);font-style:italic;margin-top:8px">(no replies)</div>`;
  }
  content.innerHTML = html;
  overlay.classList.add('visible');
}

function closeThreadOverlay() {
  document.getElementById('thread-overlay').classList.remove('visible');
}

async function doAction(event, id, action) {
  event.stopPropagation();
  await api(`/tasks/${id}/${action}`, { method: 'POST', body: '{}' });
  await refresh();
}

async function setPriority(event, id, priority) {
  event.stopPropagation();
  await api(`/tasks/${id}/priority`, { method: 'POST', body: JSON.stringify({ priority }) });
  await refresh();
}

async function setFlag(event, id, who) {
  event.stopPropagation();
  await api(`/tasks/${id}/flag`, { method: 'POST', body: JSON.stringify({ who }) });
  await refresh();
}

function showStory(event, id) {
  event.stopPropagation();
  const el = document.getElementById(`story-${id}`);
  el.classList.toggle('visible');
  if (el.classList.contains('visible')) el.querySelector('input').focus();
}

function showEdit(event, id) {
  event.stopPropagation();
  const el = document.getElementById(`edit-${id}`);
  el.classList.toggle('visible');
  if (el.classList.contains('visible')) { const inp = el.querySelector('input'); inp.focus(); inp.select(); }
}

async function submitEdit(id, input) {
  const text = input.value.trim();
  if (!text) return;
  await api(`/tasks/${id}/edit`, { method: 'POST', body: JSON.stringify({ body: text }) });
  await refresh();
}

async function removeStory(id, persona) {
  if (!confirm(`Remove ♟${persona} from task ${id}?`)) return;
  await api(`/tasks/${id}/unstory`, { method: 'POST', body: JSON.stringify({ persona }) });
  await refresh();
}

async function submitStory(id, input) {
  const persona = input.value.trim();
  if (!persona) return;
  await api(`/tasks/${id}/story`, { method: 'POST', body: JSON.stringify({ persona }) });
  input.value = '';
  await refresh();
}

function showSnooze(event, id) {
  event.stopPropagation();
  document.getElementById(`snooze-${id}`).classList.toggle('visible');
}

function showReply(event, id) {
  event.stopPropagation();
  const el = document.getElementById(`reply-${id}`);
  el.classList.toggle('visible');
  if (el.classList.contains('visible')) el.querySelector('input').focus();
}

async function doSnooze(event, id, when) {
  event.stopPropagation();
  const d = new Date();
  if (when === 'tomorrow') d.setDate(d.getDate() + 1);
  else if (when === 'friday') { const day = d.getDay(); d.setDate(d.getDate() + ((5 - day + 7) % 7 || 7)); }
  else if (when === 'next-week') d.setDate(d.getDate() + 7);
  else if (when === 'next-month') d.setMonth(d.getMonth() + 1);
  await api(`/tasks/${id}/snooze`, { method: 'POST', body: JSON.stringify({ to_date: d.toISOString().slice(0, 10) }) });
  await refresh();
}

async function doSnoozeDate(event, id, dateVal) {
  event.stopPropagation();
  if (!dateVal) return;
  await api(`/tasks/${id}/snooze`, { method: 'POST', body: JSON.stringify({ to_date: dateVal }) });
  await refresh();
}

async function submitReply(id, input) {
  const text = input.value.trim();
  if (!text) return;
  await api(`/tasks/${id}/reply`, { method: 'POST', body: JSON.stringify({ body: text, source: 'hallie' }) });
  input.value = '';
  expandedId = id;
  await refresh();
  toggleTask(id);
}

async function addTask() {
  const input = document.getElementById('add-input');
  const tags = document.getElementById('add-tags');
  let body = input.value.trim();
  if (!body) return;
  let project = null;
  const repoMatch = body.match(/^@(\S+)\s+(.+)/);
  if (repoMatch) { project = `/Users/hlarsson/repos/${repoMatch[1]}`; body = repoMatch[2]; }
  const priority = document.getElementById('add-priority').value || null;
  const needs = document.getElementById('add-needs').value || null;
  await api('/tasks/add', {
    method: 'POST',
    body: JSON.stringify({ body, project, tags: tags.value ? [tags.value] : [], source: 'hallie', priority, needs }),
  });
  input.value = '';
  await refresh();
}

document.getElementById('add-input').addEventListener('keydown', e => { if (e.key === 'Enter') addTask(); });
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (document.getElementById('thread-overlay').classList.contains('visible')) return closeThreadOverlay();
    if (expandedId) { expandedId = null; document.querySelectorAll('.task').forEach(el => el.classList.remove('expanded')); return; }
  }
  // Skip keyboard nav when typing in an input
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA' || e.target.tagName === 'SELECT') return;
  if (document.getElementById('thread-overlay').classList.contains('visible')) return;

  const tasks = [...document.querySelectorAll('.task')];
  if (!tasks.length) return;
  const ids = tasks.map(t => parseInt(t.dataset.id));
  const idx = expandedId ? ids.indexOf(expandedId) : -1;

  if (e.key === 'j' || e.key === 'ArrowDown') {
    e.preventDefault();
    const next = idx < ids.length - 1 ? idx + 1 : 0;
    toggleTask(ids[next]);
    tasks[next].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  } else if (e.key === 'k' || e.key === 'ArrowUp') {
    e.preventDefault();
    const prev = idx > 0 ? idx - 1 : ids.length - 1;
    toggleTask(ids[prev]);
    tasks[prev].scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  } else if (e.key === 'd' && expandedId) {
    doAction(e, expandedId, 'done');
  } else if (e.key === 's' && expandedId) {
    showSnooze(e, expandedId);
  } else if (e.key === 'r' && expandedId) {
    showReply(e, expandedId);
  } else if (e.key === 'x' && expandedId) {
    doAction(e, expandedId, 'cancel');
  }
});

// ── meta (stats, oncall) ──────────────────────

async function refreshMeta() {
  const [stats, oncall] = await Promise.all([api('/stats'), api('/oncall')]);
  document.getElementById('stat-open').textContent = stats.open;
  document.getElementById('stat-flagged').textContent = stats.flagged;
  document.getElementById('stat-done').textContent = stats.done_today;
  document.getElementById('stat-claude').textContent = stats.claude_tasks;

  const badge = document.getElementById('oncall-badge');
  if (oncall.active) {
    badge.className = 'oncall-badge active';
    badge.textContent = `${oncall.who} (${oncall.remaining_minutes}m)`;
  } else {
    badge.className = 'oncall-badge inactive';
    badge.textContent = 'no oncall';
  }

  const attnBadge = document.getElementById('attn-count');
  if (stats.flagged > 0) {
    attnBadge.textContent = stats.flagged;
    attnBadge.style.display = 'inline-block';
  } else {
    attnBadge.style.display = 'none';
  }
}

// ── refresh logic (skips if user is typing) ───

async function refresh() {
  const wasExpanded = expandedId;
  await Promise.all([loadTab(currentTab, true), refreshMeta()]);
  if (wasExpanded) {
    // re-expand and reload thread
    expandedId = wasExpanded;
    document.querySelectorAll('.task').forEach(el => {
      el.classList.toggle('expanded', parseInt(el.dataset.id) === expandedId);
    });
    if (document.getElementById(`thread-${wasExpanded}`)) {
      toggleTask(wasExpanded);
    }
  }
}

async function autoRefresh() {
  if (userIsTyping) return; // don't blow away their input
  // only refresh meta + stats; reload content only if nothing is expanded
  await refreshMeta();
  if (!expandedId && !userIsTyping) {
    await loadTab(currentTab);
  }
}

// tab clicks
document.querySelectorAll('.tab').forEach(t => {
  t.addEventListener('click', () => loadTab(t.dataset.tab));
});

// boot
refresh();
setInterval(autoRefresh, 30000);
</script>
